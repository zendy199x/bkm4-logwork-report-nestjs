services:
  - type: web
    name: jira-logwork-web
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start
    autoDeploy: true
    envVars:
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: PORT
        value: 3000
      - key: JIRA_DOMAIN
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: WEBHOOK
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: jira-logwork-daily-cron
    runtime: node
    rootDir: .
    schedule: "0 10 * * 1-5"
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run cron:run
    envVars:
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: JIRA_DOMAIN
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: WEBHOOK
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
