name: Develop PR Validation

on:
    pull_request:
        branches:
            - develop
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review

concurrency:
    group: develop-pr-validation-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    NODE_VERSION: '22'
    PNPM_VERSION: '11.0.8'

jobs:
    validate:
        name: Validate, Test, Build
        runs-on: ubuntu-latest
        if: ${{ !github.event.pull_request.draft }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run unit tests with coverage threshold
              run: pnpm run test:coverage

            - name: Build app
              run: pnpm run build

            - name: Typecheck test project
              run: pnpm tsc -p tsconfig.spec.json --noEmit

            - name: Validate legacy phrases are removed
              run: pnpm run check:legacy-phrases
